<!doctype html>

<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0b0c0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/app.webmanifest">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <title>Gekko</title>
  <style>
    :root { color-scheme: dark; font: 15px/1.4 system-ui, sans-serif; background: #0b0c0f; }
    * { box-sizing: border-box; }
    body { min-width: 20rem; min-height: 100vh; margin: 0; background: #0b0c0f; color: #f1f3f5; }
    iframe { position: fixed; inset: 0; width: 100%; height: 100%; border: 0; background: #0b0c0f; }
    #status {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: grid;
      place-content: center;
      gap: 0.75rem;
      padding: 2rem;
      text-align: center;
      background: #0b0c0f;
    }
    #status[hidden] { display: none; }
    #detail { max-width: 32rem; color: #aeb4bf; }
    a { color: #c9d9ff; }
  </style>
</head>
<body>
  <main id="status" aria-live="polite">
    <strong>Gekko</strong>
    <span id="detail">Checking for the latest release…</span>
    <span><a href="/source.html">Source</a> · <a href="/LICENSE.txt">GPL-3.0-only</a></span>
  </main>
  <iframe id="app" title="Gekko" hidden></iframe>
  <noscript>JavaScript is required. <a href="/source.html">Source</a></noscript>
  <script type="module">
    const status = document.querySelector("#status");
    const detail = document.querySelector("#detail");
    const app = document.querySelector("#app");

    function waitForController() {
      if (navigator.serviceWorker.controller !== null) return Promise.resolve();
      return new Promise((resolve, reject) => {
        const timeout = setTimeout(() => reject(new Error("offline worker did not take control")), 5000);
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          clearTimeout(timeout);
          resolve();
        }, { once: true });
      });
    }

    async function registerWorker() {
      if (!("serviceWorker" in navigator)) return null;
      const registration = await navigator.serviceWorker.register("/sw.js", {
        scope: "/",
        type: "module",
        updateViaCache: "none",
      });
      await registration.update().catch(() => {});
      await navigator.serviceWorker.ready;
      await waitForController();
      return navigator.serviceWorker.controller;
    }

    async function fetchLatestRelease() {
      const response = await fetch("/release.json", { cache: "no-store" });
      if (!response.ok) throw new Error(`release check failed: HTTP ${response.status}`);
      return { release: await response.json(), offline: response.headers.has("X-Gekko-Offline") };
    }

    async function stageLatestRelease(release) {
      const response = await fetch("/.gekko/stage-release", {
        method: "POST",
        cache: "no-store",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(release),
      });
      const result = await response.json();
      if (!response.ok && !result.release) throw new Error(result.error ?? "release staging failed");
      return result;
    }

    async function launch() {
      const worker = await registerWorker();
      if (worker === null) throw new Error("this browser does not support offline applications");
      const latest = await fetchLatestRelease();
      let release = latest.release;
      let saved = latest.offline;
      detail.textContent = latest.offline ? "Opening the saved release…" : "Preparing the latest release…";
      const staged = await stageLatestRelease(release);
      if (!staged.release) throw new Error(staged.error ?? "no usable release is available");
      release = staged.release;
      saved ||= !staged.ok;

      const url = new URL(release.frontend.url, location.href);
      app.addEventListener("load", () => {
        status.hidden = true;
        app.hidden = false;
      }, { once: true });
      if (saved) detail.textContent = "Using the last saved release.";
      app.src = url.href;
    }

    launch().catch(error => {
      detail.textContent = `Unable to open Gekko: ${error.message}`;
    });
  </script>
</body>
</html>
